services:
  - type: web
    name: fuzejumperz-api
    env: node
    region: singapore
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: OLLAMA_URL
        value: https://ollama.com/api
      - key: DEFAULT_MODEL
        value: qwen2.5:7b
      - key: GOOGLE_SHEETS_KEY_FILE
        value: sheets-key.json

  - type: web
    name: fuzejumperz
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://fuzejumperz-api.onrender.com/api

